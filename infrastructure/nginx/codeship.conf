# CodeShip Nginx Configuration Template

# 1. Main Dashboard Server Block
server {
    listen 80;
    server_name deploy.atharvabaodhankar.me;

    location / {
        proxy_pass http://127.0.0.1:3000; # Points to Next.js dashboard
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 2. Wildcard User Applications Server Block
# Note: The deployment worker will dynamically write individual server blocks
# for each project at /etc/nginx/sites-enabled/<project-slug>.conf.
# However, this wildcard block can serve as a fallback.
server {
    listen 80;
    server_name *.apps.atharvabaodhankar.me;

    location / {
        # This fallback block is generally not needed because the worker writes
        # specific files, but it ensures Nginx doesn't crash on unmapped subdomains.
        return 404 "Application not found or is currently building on CodeShip.";
    }
}
